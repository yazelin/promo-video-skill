<!doctype html><html><head><meta charset="utf-8"><title>term</title>
<style>
  html,body{margin:0;height:100%;background:#070a10;overflow:hidden}
  .stage{height:100%;box-sizing:border-box;display:flex;align-items:center;justify-content:center;padding:64px 96px}
  .win{width:100%;max-width:1060px;height:568px;background:#0b0e14;border:1px solid #232a38;
    border-radius:14px;box-shadow:0 32px 90px rgba(0,0,0,.65);overflow:hidden;display:flex;flex-direction:column}
  .bar{height:46px;flex:0 0 auto;background:#11151d;border-bottom:1px solid #232a38;
    display:flex;align-items:center;padding:0 18px}
  .dot{width:13px;height:13px;border-radius:50%;margin-right:9px}
  .dot.r{background:#ff5f57}.dot.y{background:#febc2e}.dot.g{background:#28c840}
  .title{color:#6b7488;font-size:15px;margin-left:10px;
    font-family:'DejaVu Sans Mono','Noto Sans Mono CJK TC',monospace}
  #term{flex:1;box-sizing:border-box;padding:24px 30px;overflow:hidden;
    font-family:'DejaVu Sans Mono','Noto Sans Mono CJK TC','Noto Sans TC',monospace;
    font-size:24px;line-height:1.5;color:#d8dee9;white-space:pre-wrap;word-break:break-word}
  .prompt{color:#e8b64c;font-weight:700}          /* $ 金色 */
  .cmd{color:#eceff4;font-weight:700}
  .c{color:#40e0d0}   /* cyan 分支 */
  .d{color:#6b7488}   /* dim */
  .r{color:#e64a4a;font-weight:700}   /* red dirty/crash */
  .g{color:#46c878}   /* green */
  .y{color:#e8b64c}   /* gold */
  .cur{background:#e8b64c;color:#0b0e14;animation:bl 1s steps(1) infinite}
  @keyframes bl{50%{opacity:0}}
</style></head>
<body><div class="stage"><div class="win">
  <div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="title">wip — ~/dev</span></div>
  <div id="term"></div>
</div></div>
<script>
const T=document.getElementById('term');
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
function line(html){const d=document.createElement('div');d.innerHTML=html;T.appendChild(d);return d;}
async function type(el,text,ms){ // 逐字打字 + 游標
  for(let i=0;i<text.length;i++){ el.innerHTML='<span class="prompt">$ </span><span class="cmd">'+text.slice(0,i+1)+'</span><span class="cur">&nbsp;</span>'; await sleep(ms);}
  el.innerHTML='<span class="prompt">$ </span><span class="cmd">'+text+'</span>';
}
async function run(script){
  const t0=performance.now(); window.__STEPLOG=[];   // 記每步輸出出現時間(秒),給旁白對時
  for(let idx=0; idx<script.length; idx++){ const step=script[idx];
    if(step.clear!==false) T.innerHTML='';   // 每步清空,內容單獨滿版可見
    const cl=line(''); await type(cl, step.cmd, step.typeMs||55);
    await sleep(step.gapMs||350);
    for(const o of (step.out||[])){ line(o); await sleep(step.lineMs||90); }
    window.__STEPLOG.push({i:idx, outAt:(performance.now()-t0)/1000});
    line('&nbsp;');
    T.scrollTop=T.scrollHeight;
    await sleep(step.holdMs||1800);
  }
  window.__TERM_DONE=true;
}
run(window.TERM_SCRIPT || [{cmd:'echo hello',out:['hello'],holdMs:1500}]);
</script></body></html>
